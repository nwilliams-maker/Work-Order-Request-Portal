<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Order Dispatch | Terraboost Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; color: #0f172a; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .form-card { border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid #e2e8f0; background: #ffffff; }
        label { color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.65rem; display: block; margin-bottom: 8px; }
        .signature-font { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #0f172a; border-bottom: 2px solid #94a3b8; background: transparent; width: 100%; padding: 0; line-height: 1; outline: none; box-shadow: none !important; }
        .status-pill { border: 2px solid #e2e8f0; transition: all 0.2s; cursor: pointer; background: #f8fafc; }
        input[type="radio"]:checked + .status-pill { border-color: currentColor; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: #ffffff; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="captureArea" class="max-w-[1400px] mx-auto form-card">
        <div class="brand-gradient p-8 text-white flex justify-between items-center no-print">
            <div class="flex items-center gap-6">
                <div class="bg-white p-2.5 rounded-xl shadow-lg">
                    <div class="bg-slate-900 text-white font-black text-3xl px-4 py-2 rounded-lg">TBM</div>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">Terraboost Media</h1>
                    <p class="text-blue-400 text-[10px] md:text-xs uppercase font-black tracking-[0.25em] opacity-90 mt-1">Route Authorization Portal</p>
                </div>
            </div>
            <button type="button" onclick="location.reload()" class="hidden md:block text-[10px] text-slate-400 font-bold border border-slate-700 px-4 py-2 rounded-lg hover:bg-slate-800">RESET PORTAL</button>
        </div>

        <form id="dispatchForm" class="p-6 md:p-10 lg:p-12 space-y-12">
            <div id="icMode" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                
                <div class="lg:col-span-5 space-y-8">
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/40 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Route Authorization</h3>
                        <div id="summaryZone" class="space-y-4 text-sm font-medium">
                            </div>
                    </div>
                    
                    <div class="space-y-4">
                        <button type="button" onclick="viewRoute(11)" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest text-xs flex justify-center items-center gap-2 hover:bg-black transition-all">
                            <span>🗺️</span> View Route Preview
                        </button>
                        <button type="button" onclick="copyMapUrl()" class="w-full bg-white border-2 border-slate-100 text-slate-400 font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest flex justify-center items-center gap-2">
                            <span>🔗</span> Copy Browser Link
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-8 bg-white p-8 md:p-10 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/40">
                    <div class="grid grid-cols-2 gap-5">
                        <label class="relative">
                            <input type="radio" name="ic_decision" value="Accepted" class="sr-only" checked onchange="toggleView()">
                            <div class="status-pill text-center py-5 rounded-2xl text-emerald-600 font-black text-xs uppercase tracking-widest">Accept Route</div>
                        </label>
                        <label class="relative">
                            <input type="radio" name="ic_decision" value="Declined" class="sr-only" onchange="toggleView()">
                            <div class="status-pill text-center py-5 rounded-2xl text-red-600 font-black text-xs uppercase tracking-widest">Decline Route</div>
                        </label>
                    </div>

                    <div id="acceptBlock" class="space-y-10">
                        <div class="space-y-4">
                            <label class="text-blue-600 font-black uppercase text-[10px] tracking-widest">Electronic Signature</label>
                            <input type="text" id="typed_sig" placeholder="Type Legal Name" class="signature-font" oninput="document.getElementById('live_sig_text').innerText=this.value">
                        </div>

                        <div class="flex items-start gap-4 p-6 bg-blue-50/50 rounded-2xl border border-blue-100 mt-8">
                            <input type="checkbox" id="legal_consent" class="mt-1 h-5 w-5 rounded text-blue-600">
                            <label for="legal_consent" class="text-xs text-slate-700 leading-relaxed cursor-pointer select-none">
                                I, <span id="live_sig_text" class="text-blue-800 font-black italic border-b border-blue-200 px-1">________________</span>, certify that I am an Independent Contractor.
                            </label>
                        </div>
                    </div>
                    
                    <button type="button" onclick="submitFinal()" class="bg-blue-600 text-white font-black py-6 rounded-2xl shadow-xl text-sm uppercase tracking-[0.2em] w-full hover:bg-blue-700">Submit Final Response</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbynAIziubArSQ0hVGTvJMpk11a9yLP0kNcSmGpcY7GDNRT25Po5p92K3EDslx9VycKC/exec";
        const params = new URLSearchParams(window.location.search);
        const routeId = params.get('route');

        window.onload = async () => {
            const res = await fetch(`${webAppUrl}?action=getRoute&routeId=${routeId}`);
            const data = await res.json();
            const d = data.payload; window.payloadData = d;

            document.getElementById('summaryZone').innerHTML = `
                <div class="flex justify-between border-b pb-2 mb-2 font-bold uppercase text-[9px] tracking-widest text-slate-300"><span>Summary</span></div>
                <div class="flex justify-between border-b border-slate-100 pb-3 mb-3"><span>Contractor:</span> <span class="font-bold text-slate-900">${d.icn}</span></div>
                <div class="flex justify-between text-blue-600 font-bold pb-3 mb-3 border-b border-slate-100"><span>Work Order #:</span> <span>${d.wo}</span></div>
                <div class="flex justify-between pb-3 mb-3 border-b border-slate-100"><span>Stops:</span> <span class="font-bold text-slate-900">${d.lCnt}</span></div>
                <div class="flex justify-between pb-3 mb-3"><span>Mileage:</span> <span class="font-medium">${d.mi} Miles</span></div>
                <div class="flex justify-between border-t border-slate-200 pt-6 mt-2 font-black text-5xl text-emerald-600 leading-none"><span>Total:</span> <span>$${d.comp}</span></div>
            `;
        };

        // GOOGLE MAPS FIX: Origin and Destination are Home
        function getMapsUrl(limit) {
            const stops = window.payloadData.locs.split(' | ');
            const home = encodeURIComponent(window.payloadData.ic_home);
            const waypoints = stops.slice(0, limit).map(s => encodeURIComponent(s.trim())).join('|');
            return `https://www.google.com/maps/dir/?api=1&origin=${home}&destination=${home}&waypoints=${waypoints}&travelmode=driving`;
        }

        function viewRoute(l) { window.open(getMapsUrl(l), '_blank'); }
        function copyMapUrl() { navigator.clipboard.writeText(getMapsUrl(25)); alert("Route Copied"); }
        
        async function submitFinal() {
            const dec = document.querySelector('input[name="ic_decision"]:checked').value;
            await fetch(webAppUrl, { method: 'POST', body: JSON.stringify({ action: "authorizeRoute", routeId: routeId, decision: dec, signature: document.getElementById('typed_sig').value })});
            alert("Response Recorded.");
        }
    </script>
</body>
</html>
